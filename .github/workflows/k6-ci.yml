# .github/workflows/k6-ci.yml
# FinanceQA K6 — Automated Performance CI Pipeline
# Triggers on every push to main branch

name: FinanceQA K6 - Performance CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1-5'  # runs every weekday at 8am UTC

jobs:

  # ── JOB 1: Smoke Test (fast gate — runs first) ────────────────
  smoke-test:
    name: Smoke Test — API Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup K6
        uses: grafana/setup-k6-action@v1

      - name: Run Smoke Test
        run: k6 run tests/api/smoke-test.js

  # ── JOB 2: Load Test (runs after smoke passes) ────────────────
  load-test:
    name: Load Test — Normal Traffic
    runs-on: ubuntu-latest
    needs: smoke-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup K6
        uses: grafana/setup-k6-action@v1

      - name: Run Load Test
        run: k6 run tests/api/load-test.js

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-load-test-report
          path: reports/
          retention-days: 30

  # ── JOB 3: Stress Test (parallel with load) ───────────────────
  stress-test:
    name: Stress Test — High Traffic
    runs-on: ubuntu-latest
    needs: smoke-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup K6
        uses: grafana/setup-k6-action@v1

      - name: Run Stress Test
        run: k6 run tests/api/stress-test.js

  # ── JOB 4: Performance Summary ────────────────────────────────
  performance-summary:
    name: Performance Summary
    runs-on: ubuntu-latest
    needs: [smoke-test, load-test, stress-test]
    if: always()

    steps:
      - name: Print Summary
        run: |
          echo "========================================"
          echo "  FinanceQA K6 — Performance Pipeline"
          echo "========================================"
          echo "  Smoke Test:   ${{ needs.smoke-test.result }}"
          echo "  Load Test:    ${{ needs.load-test.result }}"
          echo "  Stress Test:  ${{ needs.stress-test.result }}"
          echo "  Timestamp:    $(date)"
          echo "========================================"